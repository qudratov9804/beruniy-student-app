name: EAS Preview

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]

jobs:
  preview:
    name: Expo Preview Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create EAS update
        id: update
        run: |
          eas update --channel pr-${{ github.event.pull_request.number }} \
            --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📱 Expo Preview Ready!\n\nScan the QR code below in the Expo Go app to preview this PR.\n\n**Channel:** \`pr-${{ github.event.pull_request.number }}\`\n\n> Built with [Expo EAS](https://expo.dev)`
            })
